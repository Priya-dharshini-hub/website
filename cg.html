<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive JS Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #count {
      font-size: 24px;
      margin-top: 20px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>Click Counter</h1>
  <button onclick="increaseCount()">Click Me!</button>
  <div id="count">Count: 0</div>

  <script>
    let count = 0;

    function increaseCount() {
      count++;
      document.getElementById("count").innerText = "Count: " + count;

      // Extra interaction: change color randomly
      const colors = ["red", "blue", "green", "purple", "orange"];
      document.getElementById("count").style.color =
        colors[Math.floor(Math.random() * colors.length)];
    }
  </script>

</body>
</html>
